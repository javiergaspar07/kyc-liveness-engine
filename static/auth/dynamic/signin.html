<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Biometric Enrollment</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8; /* Slightly different background to distinguish from login */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .header-tag {
            color: #6366f1;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .video-wrapper {
            position: relative;
            margin: 1.5rem 0;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            border: 3px solid transparent;
            transition: border-color 0.3s ease;
        }
        .video-wrapper.active {
            border-color: #6366f1;
        }
        video {
            width: 100%;
            display: block;
            transform: scaleX(-1); /* Mirror effect */
        }
        .instruction-overlay {
            position: absolute;
            bottom: 10%;
            left: 5%;
            right: 5%;
            background: rgba(15, 23, 42, 0.85);
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
            display: none;
            backdrop-filter: blur(4px);
        }
        input[type="text"] {
            width: 80%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #6366f1;
        }
        button {
            background-color: #6366f1;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
        }
        button:hover { background-color: #4f46e5; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        
        #status-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-weight: bold;
            animation: fadeIn 0.3s ease-in;
        }
        .success { background-color: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .error { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .info { background-color: #f8fafc; color: #334155; border: 1px solid #e2e8f0; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-tag">Account Setup</div>
    <h2>Biometric Enrollment</h2>
    <p>Register your unique 3D facial vector to secure your account.</p>
    
    <input type="text" id="userIdInput" placeholder="Choose a unique User ID" autocomplete="off">
    <br>
    <button id="startBtn" onclick="startSecureEnrollment()">Start Registration</button>

    <div class="video-wrapper" id="videoWrapper">
        <video id="webcam" autoplay playsinline></video>
        <div id="instructionOverlay" class="instruction-overlay">Initializing camera...</div>
    </div>

    <div id="status-box"></div>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
    const FPS = 10; 
    let ws = null;
    let cameraStream = null;
    let frameInterval = null;

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('hiddenCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const instructionOverlay = document.getElementById('instructionOverlay');
    const statusBox = document.getElementById('status-box');
    const startBtn = document.getElementById('startBtn');
    const userIdInput = document.getElementById('userIdInput');
    const videoWrapper = document.getElementById('videoWrapper');

    async function startSecureEnrollment() {
        const userId = userIdInput.value.trim();
        if (!userId) {
            showStatus("Please enter a valid User ID to register.", "error");
            return;
        }

        // 1. Lock UI
        startBtn.disabled = true;
        userIdInput.disabled = true;
        statusBox.style.display = 'none';
        instructionOverlay.style.display = 'block';
        instructionOverlay.innerText = "Requesting secure camera access...";
        videoWrapper.classList.add('active');

        try {
            // 2. Init Camera
            cameraStream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480, facingMode: "user" } 
            });
            video.srcObject = cameraStream;
            
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                connectEnrollmentWebSocket(userId);
            };

        } catch (err) {
            console.error("Camera error:", err);
            showStatus("Camera access is required for enrollment.", "error");
            resetApp();
        }
    }

    function connectEnrollmentWebSocket(userId) {
        instructionOverlay.innerText = "Connecting to Identity Server...";
        
        // Connect to the Dynamic Sign-in Endpoint
        const wsUrl = `ws://localhost:8000/ws/v3/kyc/signin/${userId}`;
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            console.log("WebSocket opened for Enrollment.");
            frameInterval = setInterval(sendVideoFrame, 1000 / FPS);
        };

        ws.onmessage = (event) => {
            const response = JSON.parse(event.data);
            console.log("Server Message:", response);

            // 3. Handle Registration State Machine
            switch (response.status) {
                case "challenge_issued":
                    instructionOverlay.style.background = "rgba(15, 23, 42, 0.85)"; // Reset color
                    instructionOverlay.innerText = `Liveness Step ${response.step}: ${response.instruction}`;
                    break;
                case "info":
                    instructionOverlay.style.background = "rgba(3, 105, 161, 0.9)"; // Blue info tint
                    instructionOverlay.innerText = response.instruction;
                    break;
                case "liveness_passed":
                    instructionOverlay.style.background = "rgba(4, 120, 87, 0.9)"; // Green success tint
                    instructionOverlay.innerText = response.message;
                    break;
                case "enrolled": // Specific to the signin endpoint
                    showStatus(`✅ ${response.message}\nSaved a ${response.vector_dimensions}D vector for user: ${response.external_user_id}`, "success");
                    cleanup();
                    break;
                case "error":
                    showStatus(`❌ ${response.message}`, "error");
                    cleanup();
                    break;
            }
        };

        ws.onerror = (error) => {
            console.error("WebSocket Error:", error);
            showStatus("Connection to identity server lost.", "error");
            cleanup();
        };

        ws.onclose = () => {
            console.log("WebSocket closed.");
            cleanup();
        };
    }

    function sendVideoFrame() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64DataUrl = canvas.toDataURL('image/jpeg', 0.7);
        const base64Payload = base64DataUrl.split(',')[1];
        
        ws.send(base64Payload);
    }

    function showStatus(message, type) {
        statusBox.className = type;
        statusBox.innerText = message;
        statusBox.style.display = 'block';
    }

    function cleanup() {
        if (frameInterval) clearInterval(frameInterval);
        if (ws && ws.readyState === WebSocket.OPEN) ws.close();
        if (cameraStream) {
            cameraStream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }
        instructionOverlay.style.display = 'none';
        videoWrapper.classList.remove('active');
        resetApp();
    }

    function resetApp() {
        startBtn.disabled = false;
        userIdInput.disabled = false;
        userIdInput.value = ''; // Clear input for next potential user
    }
</script>

</body>
</html>
